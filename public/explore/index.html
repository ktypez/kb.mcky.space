<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKF Knowledge Graph</title>
<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
:root {
  --bg: #15171c; --bg2: #1c1f26; --bg3: #262a33; --text: #e6edf3;
  --dim: #9298a4; --border: #30363d; --accent: #58a6ff;
  --green: #22c55e; --yellow: #d29922; --red: #e22626; --purple: #bc8cff;
}
[data-theme="light"] {
  --bg: #fff; --bg2: #f4f5f7; --bg3: #eaeef2; --text: #1f2328;
  --dim: #63697a; --border: #e6e8eb; --accent: #0969da;
  --green: #1a7f37; --yellow: #9a6700; --red: #cf222e; --purple: #8250df;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Poppins, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
#app { display: flex; height: 100vh; }
#main { flex: 1; position: relative; }
#cy { width: 100%; height: 100%; }
#toolbar { position: absolute; top: 10px; left: 10px; display: flex; gap: 6px; align-items: center; z-index: 10; flex-wrap: wrap; }
#search { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 12px; width: 180px; outline: none; }
#search:focus { border-color: var(--accent); }
.btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }
.btn:hover { background: var(--bg3); }
.btn-s { font-size: 10px; padding: 3px 8px; border-radius: 8px; }
.filter-bar { display: flex; gap: 3px; flex-wrap: wrap; }
.filter-btn { font-size: 9px; padding: 2px 7px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--dim); cursor: pointer; }
.filter-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
#panel { width: 380px; max-width: 90vw; background: var(--bg2); border-left: 1px solid var(--border); overflow-y: auto; display: none; flex-direction: column; }
#panel.open { display: flex; }
#panel-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
#panel-head h2 { font-size: 14px; font-weight: 600; flex: 1; }
#panel-close { background: none; border: none; color: var(--dim); font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
#panel-close:hover { background: var(--bg3); color: var(--text); }
#panel-body { padding: 12px 16px; flex: 1; }
.section { margin-bottom: 12px; }
.section h3 { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--dim); margin-bottom: 4px; }
.section p { font-size: 13px; line-height: 1.5; }
.section pre { font-size: 11px; line-height: 1.5; color: var(--dim); white-space: pre-wrap; max-height: 160px; overflow-y: auto; font-family: ui-monospace,SFMono-Regular,monospace; margin-top: 4px; }
.tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 8px; background: var(--bg3); color: var(--accent); border: 1px solid var(--border); margin: 1px; }
.tag-green { color: #fff; background: var(--green); border-color: var(--green); }
.tag-red { color: #fff; background: var(--red); border-color: var(--red); }
.tech-grid { display: grid; grid-template-columns: auto 1fr; gap: 2px 12px; font-size: 12px; }
.tech-grid dt { color: var(--dim); }
.tech-grid dd { color: var(--text); }
.edge-list { font-size: 12px; }
.edge-list li { padding: 3px 0; border-bottom: 1px solid var(--border); list-style: none; }
.edge-list li:last-child { border-bottom: none; }
#stats { position: absolute; bottom: 10px; left: 10px; font-size: 10px; color: var(--dim); background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 5px 8px; z-index: 10; }
#legend { position: absolute; bottom: 10px; right: 10px; font-size: 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 6px 10px; z-index: 10; }
#legend div { display: flex; align-items: center; gap: 5px; padding: 1px 0; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-rect { width: 12px; height: 8px; border-radius: 1px; flex-shrink: 0; border: 1.5px solid var(--accent); }
#status { position: absolute; top: 10px; right: 10px; font-size: 10px; color: var(--dim); z-index: 10; }
@media(max-width:768px){ #panel { width: 100vw; max-width:100vw; } #search { width:120px; } }
</style>
</head>
<body>
<div id="app">
<div id="main">
  <div id="toolbar">
    <input id="search" placeholder="Search…">
    <button class="btn" id="btn-reset">Reset</button>
    <button class="btn" id="btn-theme">☀</button>
    <div class="filter-bar" id="filters"></div>
  </div>
  <div id="cy"></div>
  <div id="stats"></div>
  <div id="status"></div>
  <div id="legend">
    <div><div class="legend-rect"></div> Project</div>
    <div><div class="legend-dot" style="background:var(--accent)"></div> Framework</div>
    <div><div class="legend-dot" style="background:var(--green)"></div> Database</div>
    <div><div class="legend-dot" style="background:var(--yellow)"></div> Language</div>
    <div><div class="legend-dot" style="background:var(--red)"></div> Deploy</div>
    <div><div class="legend-dot" style="background:var(--purple)"></div> Other</div>
  </div>
</div>
<div id="panel">
  <div id="panel-head"><h2 id="panel-title"></h2><button id="panel-close">&times;</button></div>
  <div id="panel-body"></div>
</div>
</div>
<script>
const COLORS = { framework:'#58a6ff', database:'#3fb950', language:'#d29922', deployment:'#f85149', auth:'#bc8cff', 'state-management':'#f0883e', testing:'#79c0ff', storage:'#7ee787', ui:'#ffa657' };
const TYPES = ['framework','database','language','deployment','auth','state-management','testing','storage','ui'];
let cy, DATA, activeFilters = new Set(TYPES);

async function load(){
  try {
    const r = await fetch(new URL('../graph.json', location).href);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    DATA = await r.json();
    initFilters();
    initCy();
    document.getElementById('stats').textContent = `${DATA.stats.projects} projects · ${DATA.stats.entities} entities · ${DATA.stats.edges} edges`;
  } catch(e) {
    document.getElementById('status').textContent = `Error: ${e.message}`;
  }
}

function initFilters(){
  const el = document.getElementById('filters');
  TYPES.forEach(t => {
    const b = document.createElement('button');
    b.className = 'filter-btn on';
    b.textContent = t;
    b.onclick = () => { b.classList.toggle('on'); if(b.classList.contains('on')) activeFilters.add(t); else activeFilters.delete(t); updateFilter(); };
    el.appendChild(b);
  });
}

function updateFilter(){
  cy.nodes().forEach(n => {
    const t = n.data('type');
    if(t === 'project') return;
    n.style('display', activeFilters.has(t) ? 'element' : 'none');
  });
}

function initCy(){
  const els = [];
  DATA.projects.forEach(p => {
    els.push({ data: { id: 'p:'+p.id, label: p.okf_title||p.id, type:'project', project: p } });
  });
  DATA.entities.forEach(e => {
    els.push({ data: { id: 'e:'+e.name, label: e.name, type: e.type, entity: e } });
  });
  DATA.edges.forEach(e => {
    els.push({ data: { id: e.source+'>'+e.target, source: 'p:'+e.source, target: 'e:'+e.target, label: e.relation } });
  });

  cy = cytoscape({
    container: document.getElementById('cy'),
    elements: els,
    style: [
      { selector: 'node[type="project"]', style: { 
        'background-color': 'var(--bg2)', 'border-color': 'var(--accent)', 'border-width': 1.5,
        shape: 'round-round-rectangle', width: 'label', height: 24, padding: '8px 4px',
        label: 'data(label)', 'font-size': '11px', 'color': 'var(--text)', 'text-valign': 'center', 'text-halign': 'center',
        'min-zoomed-font-size': 8
      }},
      { selector: 'node[type="project"]:selected', style: { 'border-color': '#fff', 'border-width': 2.5 }},
      { selector: 'node:child', style: { 'background-color': 'var(--bg)' }},
      ...TYPES.map(t => ({ selector: `node[type="${t}"]`, style: { 
        'background-color': COLORS[t]||'var(--purple)', 'opacity': .85,
        width: 18, height: 18, shape: 'ellipse',
        label: 'data(label)', 'font-size': '9px', 'color': 'var(--dim)', 'text-valign': 'top', 'text-halign': 'center', 'text-margin-y': 4,
        'min-zoomed-font-size': 7
      }})),
      { selector: 'edge', style: { 'line-color': 'var(--border)', 'opacity': .35, width: 1,
        'target-arrow-color': 'var(--border)', 'target-arrow-shape': 'triangle-backcurve',
        'arrow-scale': .6, 'curve-style': 'haystack'
      }},
      { selector: 'edge.highlight', style: { 'line-color': 'var(--accent)', opacity: .7, width: 2 }},
      { selector: 'node.highlight', style: { 'border-color': 'var(--accent)', 'border-width': 3, 'border-opacity': 1 }},
      { selector: 'node.dim', style: { opacity: .15 }},
      { selector: 'edge.dim', style: { opacity: .05 }},
    ],
    layout: { name: 'cose', animate: false, nodeRepulsion: 8000, idealEdgeLength: 120, gravity: 1 },
    minZoom: .15, maxZoom: 4,
  });

  cy.on('tap', function(evt){
    if(evt.target === cy) { closePanel(); return; }
    if(!evt.target.isNode()) return;
    const n = evt.target;
    const isP = n.data('type') === 'project';
    showPanel(n.data(isP ? 'project' : 'entity'), isP);
  });

  cy.on('mouseover', 'node', function(evt){
    evt.target.addClass('highlight');
    evt.target.connectedEdges().addClass('highlight');
    cy.nodes().filter(n => !n.hasClass('highlight')).addClass('dim');
    cy.edges().filter(e => !e.hasClass('highlight')).addClass('dim');
  });
  cy.on('mouseout', 'node', function(){
    cy.elements().removeClass('highlight dim');
  });

  // Search
  document.getElementById('search').addEventListener('input', function(){
    const q = this.value.toLowerCase().trim();
    cy.nodes().forEach(n => {
      const label = n.data('label').toLowerCase();
      const match = !q || label.includes(q);
      n.style('display', match ? 'element' : 'none');
    });
  });

  document.getElementById('btn-reset').onclick = () => {
    document.getElementById('search').value = '';
    cy.nodes().style('display', 'element');
    cy.fit(undefined, 40);
    closePanel();
  };

  document.getElementById('btn-theme').onclick = () => {
    const html = document.documentElement;
    html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  };

  document.getElementById('panel-close').onclick = closePanel;

  // Fit on load
  setTimeout(() => cy.fit(undefined, 40), 100);
}

function showPanel(data, isProject){
  const panel = document.getElementById('panel');
  const title = document.getElementById('panel-title');
  const body = document.getElementById('panel-body');
  panel.classList.add('open');
  if(isProject) renderProject(data);
  else renderEntity(data);
}

function renderProject(p){
  document.getElementById('panel-title').textContent = p.okf_title || p.id;
  const tags = (p.okf_tags||[]).map(t => `<span class="tag">${esc(t)}</span>`).join('');
  const edges = DATA.edges.filter(e => e.source === p.id).map(e => `<li><span class="tag">${e.target_type}</span> ${esc(e.target)}</li>`).join('');
  document.getElementById('panel-body').innerHTML = `
    <div class="section"><h3>Status</h3><p><span class="tag ${p.status==='active'?'tag-green':'tag-red'}">${p.status}</span></p></div>
    ${p.description?`<div class="section"><h3>Description</h3><p>${esc(p.description)}</p></div>`:''}
    <div class="section"><h3>Tech Stack</h3><dl class="tech-grid">
      ${p.frameworks?.length?`<dt>Framework</dt><dd>${esc(p.frameworks.join(', '))}</dd>`:''}
      ${p.languages?.length?`<dt>Language</dt><dd>${esc(p.languages.join(', '))}</dd>`:''}
      ${p.databases?.length?`<dt>DB</dt><dd>${esc(p.databases.join(', '))}</dd>`:''}
      ${p.deployment_targets?.length?`<dt>Deploy</dt><dd>${esc(p.deployment_targets.join(', '))}</dd>`:''}
      ${p.cloud_providers?.length?`<dt>Cloud</dt><dd>${esc(p.cloud_providers.join(', '))}</dd>`:''}
    </dl></div>
    ${p.agent_personality?`<div class="section"><h3>Agent</h3><p>${esc(p.agent_personality)}</p></div>`:''}
    ${tags?`<div class="section"><h3>Tags</h3><div>${tags}</div></div>`:''}
    ${edges?`<div class="section"><h3>Relations (${DATA.edges.filter(e=>e.source===p.id).length})</h3><ul class="edge-list">${edges}</ul></div>`:''}
    ${p.profile_body?`<div class="section"><h3>Profile</h3><pre>${esc(p.profile_body.slice(0,800))}</pre></div>`:''}
  `;
}

function renderEntity(e){
  document.getElementById('panel-title').textContent = e.name;
  const projects = e.projects_using||[];
  document.getElementById('panel-body').innerHTML = `
    <div class="section"><h3>Type</h3><p><span class="tag">${esc(e.type)}</span></p></div>
    <div class="section"><h3>Used by (${projects.length})</h3><ul class="edge-list">${projects.map(p=>`<li>${esc(p)}</li>`).join('')}</ul></div>
    <div class="section"><h3>Usage count</h3><p>${e.usage_count}</p></div>
  `;
}

function closePanel(){ document.getElementById('panel').classList.remove('open'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

load();
</script>
</body>
</html>
