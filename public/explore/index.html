    <span class="flow-19">☰ opens the other views.</span>
  </p>

<script>
const COLORS = { framework:'#58a6ff', database:'#22c55e', language:'#d29922', deployment:'#e22626', auth:'#bc8cff', 'state-management':'#f0883e', testing:'#79c0ff', storage:'#7ee787', ui:'#ffa657' };
const TYPES = ['framework','database','language','deployment','auth','state-management','testing','storage','ui'];
let cy, DATA, panelOpen = false;

async function load(){
  try {
    const r = await fetch(new URL('../graph.json', location).href);
    if(!r.ok) throw new Error('HTTP '+r.status);
    DATA = await r.json();
    document.getElementById('stats-label').textContent = DATA.stats.projects+' projects · '+DATA.stats.entities+' entities · '+DATA.stats.edges+' edges';
    document.getElementById('status-bar').textContent = DATA.stats.projects+' projects · '+DATA.stats.entities+' entities · '+DATA.stats.edges+' edges';
    initCy();
  } catch(e) {
    document.getElementById('stats-label').textContent = 'Error: '+e.message;
    document.getElementById('status-bar').textContent = 'Error loading graph';
  }
}

function initCy(){
  const els = [];
  DATA.projects.forEach(p => {
    els.push({ data: { id: 'p:'+p.id, label: p.okf_title||p.id, type:'project', project: p } });
  });
  DATA.entities.forEach(e => {
    els.push({ data: { id: 'e:'+e.name, label: e.name, type: e.type, entity: e } });
  });
  DATA.edges.forEach(e => {
    els.push({ data: { id: e.source+'>'+e.target, source: 'p:'+e.source, target: 'e:'+e.target, label: e.relation, target_type: e.target_type } });
  });

  cy = cytoscape({
    container: document.getElementById('cy'),
    elements: els,
    style: [
      { selector: 'node[type="project"]', style: {
        'background-color': '#1c1f26', 'border-color': '#58a6ff', 'border-width': 1.5,
        shape: 'round-round-rectangle', width: 'label', height: 24, padding: '8px 4px',
        label: 'data(label)', 'font-size': '11px', color: '#e6edf3', 'text-valign': 'center', 'text-halign': 'center',
        'min-zoomed-font-size': 8
      }},
      { selector: 'node[type="project"]:selected', style: { 'border-color': '#fff', 'border-width': 2.5 }},
      ...TYPES.map(t => ({ selector: 'node[type="'+t+'"]', style: {
        'background-color': COLORS[t]||'#bc8cff', opacity: .85,
        width: 18, height: 18, shape: 'ellipse',
        label: 'data(label)', 'font-size': '9px', color: '#9298a4', 'text-valign': 'top', 'text-halign': 'center', 'text-margin-y': 4,
        'min-zoomed-font-size': 7
      }})),
      { selector: 'edge', style: { 'line-color': '#30363d', opacity: .35, width: 1,
        'target-arrow-color': '#30363d', 'target-arrow-shape': 'triangle-backcurve',
        'arrow-scale': .6, 'curve-style': 'haystack'
      }},
      { selector: 'edge.highlight', style: { 'line-color': '#58a6ff', opacity: .7, width: 2 }},
      { selector: 'node.highlight', style: { 'border-color': '#58a6ff', 'border-width': 3, 'border-opacity': 1 }},
      { selector: 'node.dim', style: { opacity: .15 }},
      { selector: 'edge.dim', style: { opacity: .05 }},
    ],
    layout: { name: 'cose', animate: false, nodeRepulsion: 8000, idealEdgeLength: 120, gravity: 1 },
    minZoom: .15, maxZoom: 4,
  });

  // Tap: node → show panel, background → close
  cy.on('tap', function(evt){
    if(evt.target === cy) { closePanel(); return; }
    if(!evt.target.isNode()) return;
    const n = evt.target;
    const isP = n.data('type') === 'project';
    showPanel(n.data(isP ? 'project' : 'entity'), isP);
  });

  // Hover highlight
  cy.on('mouseover', 'node', function(evt){
    evt.target.addClass('highlight');
    evt.target.connectedEdges().addClass('highlight');
    cy.nodes().filter(n => !n.hasClass('highlight')).addClass('dim');
    cy.edges().filter(e => !e.hasClass('highlight')).addClass('dim');
  });
  cy.on('mouseout', 'node', function(){
    cy.elements().removeClass('highlight dim');
  });

  // Search
  document.getElementById('search').addEventListener('input', function(){
    const q = this.value.toLowerCase().trim();
    cy.nodes().forEach(n => {
      const label = n.data('label').toLowerCase();
      n.style('display', (!q || label.includes(q)) ? 'element' : 'none');
    });
  });

  // Layout switcher
  document.getElementById('layout').addEventListener('change', function(){
    cy.layout({ name: this.value, animate: true, animationDuration: 500 }).run();
  });

  // Fit
  document.getElementById('btn-fit').onclick = () => {
    cy.fit(undefined, 40);
  };

  // Theme toggle
  document.getElementById('btn-theme').onclick = () => {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') !== 'light';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  };

  // Inspector toggle
  document.getElementById('btn-panel').onclick = () => {
    if(document.getElementById('inspector').classList.contains('open')) closePanel();
    else { document.getElementById('inspector').classList.add('open'); panelOpen = true; }
  };
  document.getElementById('inspector-close').onclick = closePanel;

  // Hello dismiss
  document.getElementById('hello-x').onclick = () => {
    document.getElementById('hello').style.display = 'none';
  };
  document.getElementById('hello-go').onclick = () => {
    document.getElementById('hello').style.display = 'none';
    window.location.href = '/';
  };

  setTimeout(() => cy.fit(undefined, 40), 200);
}

function showPanel(data, isProject){
  panelOpen = true;
  const panel = document.getElementById('inspector');
  const title = document.getElementById('inspector-title');
  const body = document.getElementById('inspector-body');
  panel.classList.add('open');
  if(isProject) renderProject(data);
  else renderEntity(data);
}

function renderProject(p){
  document.getElementById('inspector-title').textContent = p.okf_title || p.id;
  const tags = (p.okf_tags||[]).map(t => '<span class="tag">'+esc(t)+'</span>').join('');
  const edges = DATA.edges.filter(e => e.source === p.id).map(e => '<li><span class="tag">'+esc(e.target_type)+'</span> '+esc(e.target)+'</li>').join('');
  document.getElementById('inspector-body').innerHTML = `
    <div class="inspector-section"><h3>Status</h3><p><span class="tag ${p.status==='active'?'tag-green':'tag-red'}">${esc(p.status)}</span></p></div>
    ${p.description?'<div class="inspector-section"><h3>Description</h3><p>'+esc(p.description)+'</p></div>':''}
    <div class="inspector-section"><h3>Tech Stack</h3><dl class="tech-grid">
      ${p.frameworks?.length?'<dt>Framework</dt><dd>'+esc(p.frameworks.join(', '))+'</dd>':''}
      ${p.languages?.length?'<dt>Language</dt><dd>'+esc(p.languages.join(', '))+'</dd>':''}
      ${p.databases?.length?'<dt>DB</dt><dd>'+esc(p.databases.join(', '))+'</dd>':''}
      ${p.deployment_targets?.length?'<dt>Deploy</dt><dd>'+esc(p.deployment_targets.join(', '))+'</dd>':''}
      ${p.cloud_providers?.length?'<dt>Cloud</dt><dd>'+esc(p.cloud_providers.join(', '))+'</dd>':''}
    </dl></div>
    ${p.agent_personality?'<div class="inspector-section"><h3>Agent</h3><p>'+esc(p.agent_personality)+'</p></div>':''}
    ${tags?'<div class="inspector-section"><h3>Tags</h3><div>'+tags+'</div></div>':''}
    ${edges?'<div class="inspector-section"><h3>Relations ('+DATA.edges.filter(e=>e.source===p.id).length+')</h3><ul class="edge-list">'+edges+'</ul></div>':''}
    ${p.profile_body?'<div class="inspector-section"><h3>Profile</h3><pre>'+esc(p.profile_body.slice(0,800))+'</pre></div>':''}
  `;
}

function renderEntity(e){
  document.getElementById('inspector-title').textContent = e.name;
  const projects = e.projects_using||[];
  document.getElementById('inspector-body').innerHTML = `
    <div class="inspector-section"><h3>Type</h3><p><span class="tag">${esc(e.type)}</span></p></div>
    <div class="inspector-section"><h3>Used by (${projects.length})</h3><ul class="edge-list">${projects.map(p=>'<li>'+esc(p)+'</li>').join('')}</ul></div>
    <div class="inspector-section"><h3>Usage count</h3><p>${e.usage_count}</p></div>
  `;
}

function closePanel(){
  panelOpen = false;
  document.getElementById('inspector').classList.remove('open');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

load();
</script>
